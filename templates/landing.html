<!DOCTYPE html>
<html>
<head>
<title>CPU Scheduler</title>

<style>
:root {
    --bg: linear-gradient(-45deg,#0f172a,#1e1b4b,#020617,#312e81);
    --text: white;
}
/* 🌙 DARK (default) */
.dark {
    --bg: linear-gradient(-45deg,#0f172a,#1e1b4b,#020617,#312e81);
    --text: white;
}

/* ☀️ LIGHT */
.light {
    --bg: linear-gradient(-45deg,#e2e8f0,#f8fafc,#e0f2fe,#f1f5f9);
    --text: black;
}

/* 🌊 OCEAN */
.ocean {
    --bg: linear-gradient(-45deg,#0ea5e9,#0284c7,#0369a1,#075985);
    --text: white;
}

/* 🌇 SUNSET */
.sunset {
    --bg: linear-gradient(-45deg,#f97316,#fb7185,#f43f5e,#e11d48);
    --text: white;
}
body {
    margin:0;
    font-family:'Segoe UI';
    background: var(--bg);
    color: var(--text);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

@keyframes bg {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* BACKGROUND BLOBS */
.blob {
    position:absolute;
    width:300px;
    height:300px;
    background: radial-gradient(circle, #7c3aed, transparent);
    filter: blur(100px);
    opacity:0.3;
    animation: float 10s infinite alternate;
    pointer-events: none;
}

.blob:nth-child(1){ top:10%; left:10%; }
.blob:nth-child(2){ bottom:10%; right:10%; }

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-40px); }
}

/* COMPUTER */
.computer {
    width:500px;
    max-width:90%;
    text-align:center;
    animation: pop 1s ease;
    position: relative;
    z-index: 10;
}

@keyframes pop {
    from {transform: scale(0.6); opacity:0;}
    to {transform: scale(1); opacity:1;}
}

/* SCREEN */
.screen {
    background:#020617;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 40px rgba(124,58,237,0.5);
}

/* TITLE */
.title {
    font-size:24px;
    margin-bottom:10px;
}

/* TAGLINE */
.tagline {
    font-size:14px;
    opacity:0.7;
    margin-bottom:20px;
}

/* SYSTEM TEXT */
.system-text {
    font-size:12px;
    opacity:0.5;
    margin-bottom:10px;
    height:18px;
}

/* BUTTONS */
.btn {
    display:block;
    width:80%;
    margin:12px auto;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.07);
    box-shadow:0 0 20px rgba(236,72,153,0.6);
}

/* STATUS */
.status {
    margin-top:10px;
    font-size:12px;
    opacity:0.7;
}

/* MONITOR */
.monitor {
    background:#111827;
    padding:15px;
    border-radius:10px;
}

.stand {
    width:100px;
    height:10px;
    background:#1e293b;
    margin:10px auto;
    border-radius:5px;
}

.base {
    width:150px;
    height:10px;
    background:#1e293b;
    margin:auto;
    border-radius:5px;
}

/* FEATURES */
.features {
    display:flex;
    gap:25px;
    margin-top:25px;
    font-size:13px;
    opacity:0.8;
}

.features div {
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0%,100%{opacity:0.6;}
    50%{opacity:1;}
}

/* FOOTER */
.footer {
    position:absolute;
    bottom:10px;
    font-size:12px;
    opacity:0.5;
    pointer-events: none;
}
h1, h2, h3, p, span, label, td, th {
    color: var(--text);
}
</style>
</head>

<body>

<div style="position:fixed; top:15px; right:20px; z-index:1000;">
<select onchange="changeTheme(this.value)" style="
    padding:8px;
    border-radius:8px;
    background:#020617;
    color:white;
">
<option value="dark">🌙 Dark</option>
<option value="light">☀️ Light</option>
<option value="ocean">🌊 Ocean</option>
<option value="sunset">🌇 Sunset</option>
</select>
</div>

<div class="blob"></div>
<div class="blob"></div>

<div class="computer">

    <div class="monitor">
        <div class="screen">

            <div class="title">CPU Scheduling Simulator</div>

            <div class="tagline">
                Visualize how your CPU executes processes in real time ⚡
            </div>

            <div class="system-text" id="systemText"></div>

            <button class="btn" onclick="goHome()">📘 Explanation</button>
            <button class="btn" onclick="goSim()">🚀 Start Simulation</button>

            <div class="status">
                System Status: <span style="color:#22c55e;">● Ready</span><br>
                Press <b>Enter</b> to start
            </div>

        </div>
    </div>

    <div class="stand"></div>
    <div class="base"></div>

</div>

<div class="features">
    <div>⚡ Fast Learning</div>
    <div>🎯 Visual Simulation</div>
    <div>🤖 AI Support</div>
</div>

<div class="footer">
    Built for interactive OS learning 💡
</div>

<script>
// Navigation
function goHome(){
    window.location.href = "/home";
}

function goSim(){
    window.location.href = "/simulator";
}

// ENTER KEY
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        goSim();
    }
});

// SYSTEM TEXT ANIMATION
let texts = [
    "Initializing CPU...",
    "Loading scheduler...",
    "Optimizing processes...",
    "Ready ✓"
];

let i = 0;
setInterval(()=>{
    document.getElementById("systemText").innerText = texts[i];
    i = (i+1) % texts.length;
},1500);
</script>
<script>
function changeTheme(theme){
    document.body.className = theme;
    localStorage.setItem("theme", theme);
}
document.addEventListener("DOMContentLoaded", function(){
    let saved = localStorage.getItem("theme") || "dark";
    document.body.className = saved;
});
</script>
</body>
</html>
