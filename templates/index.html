<!DOCTYPE html>
<html>
<head>
    <title>CPU Scheduler Simulator</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #111;
            color: white;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid white;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        select {
            padding: 8px;
        }
    </style>
</head>

<body>

    <h1>🔥 CPU Scheduler Simulator 🔥</h1>

    <!-- FORM -->
    <form method="POST">
    <label>Select Algorithm:</label>
    <select name="algorithm" onchange="toggleInputs(this.value)">
        <option value="fcfs">FCFS</option>
        <option value="sjf">SJF</option>
        <option value="rr">Round Robin</option>
        <option value="priority">Priority</option>
    </select>

    <br><br>

    <!-- Quantum -->
    <div id="quantumBox" style="display:none;">
        <label>Time Quantum:</label>
        <input type="number" name="quantum" min="1">
    </div>

    <!-- Priority -->
    <div id="priorityNote" style="display:none;">
        <p>⚠️ Using predefined priorities in backend (P1=1, P2=2, P3=3)</p>
    </div>

    <br>
    <button type="submit">Run Simulation 🚀</button>
</form>

<script>
function toggleInputs(value) {
    let q = document.getElementById("quantumBox");
    let p = document.getElementById("priorityNote");

    q.style.display = (value === "rr") ? "block" : "none";
    p.style.display = (value === "priority") ? "block" : "none";
}
</script>

    <!-- RESULT -->
    {% if result %}
    <h2>📊 Results:</h2>

    <table>
        <tr>
            <th>Process</th>
            <th>Start</th>
            <th>Finish</th>
            <th>Waiting</th>
            <th>Turnaround</th>
        </tr>

        {% for p in result %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.start }}</td>
            <td>{{ p.finish }}</td>
            <td>{{ p.waiting }}</td>
            <td>{{ p.turnaround }}</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}

</body>
</html>
